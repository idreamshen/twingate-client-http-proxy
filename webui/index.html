<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Twingate Client Web UI</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<h1>Twingate Client</h1>

<form id="login-form">
<fieldset>
<legend>Network Configuration</legend>
<label for="network">Twingate Network Name</label>
<input type="text" id="network" name="network" value="" placeholder="e.g. acme" required pattern="[A-Za-z0-9-]+" title="Letters, numbers, and hyphens only">
<small>Twingate network name (e.g. <code>acme</code> for <code>acme.twingate.com</code>)</small>
</fieldset>
<button type="submit" id="login-btn">Login</button>
</form>

<div class="card">
<h2>Status</h2>
<pre id="status">Loading...</pre>
</div>

<div class="card">
<h2>Resources</h2>
<pre id="resources">Loading...</pre>
</div>

<script src="/app.js"></script>
</body>
</html>
